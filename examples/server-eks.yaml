replicaCount: 2

# Refer to https://docs.livekit.io/deploy/kubernetes/ for instructions

livekit:
  rtc:
    use_external_ip: true
  redis:
    address: <redis-host>:6379
  keys:
    <your-api-key>: <your-secret>
  turn:
    enabled: true
    domain: <your-turn-domain>
    tls_port: 3478
    secretName: <turn-tls-secret>

loadBalancer:
  # With ALB, TLS certificates are managed by ACM.
  # Ensure you have issued a certificate for your domain in ACM.
  type: alb
  # Explicitly specify the ACM certificate ARN (recommended).
  # If omitted, the ALB controller attempts auto-discovery via domain matching.
  certificateArn: arn:aws:acm:us-east-1:123456789012:certificate/abc-1234-5678
  # Redirect HTTP to HTTPS at the ALB level (requires certificateArn).
  sslRedirect: true
  tls:
    - hosts:
        - <your-primary-domain>

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

# resources are set assuming a 8 core instance
resources:
  limits:
    cpu: 7500m
    memory: 2048Mi
  requests:
    cpu: 7000m
    memory: 1024Mi
